<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calypso Strike FC | Official Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">CALYPSO<span>STRIKE</span></div>
        <ul class="nav-links">
            <li><a href="#">Matches</a></li>
            <li><a href="#">Squad</a></li>
            <li><a href="#">News</a></li>
            <li><a href="#" class="btn-ticket">Tickets</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <span class="eyebrow">Next Match: Saturday 19:00</span>
            <h1>BE THE TIDE</h1>
            <p>Experience the rhythm of the game at the Calypso Arena.</p>
            <div class="hero-btns">
                <a href="#" class="btn-primary">View Roster</a>
                <a href="#" class="btn-secondary">Match Center</a>
            </div>
        </div>
    </header>

    <section class="container">
        <h2 class="section-title">Latest Result</h2>
        <div class="match-card">
            <div class="team">
                <img src="logo-placeholder.png" alt="CSFC">
                <span>CSFC</span>
            </div>
            <div class="score">3 - 1</div>
            <div class="team">
                <span>CITY FC</span>
                <img src="away-logo.png" alt="City">
            </div>
        </div>
    </section>

</body>
</html>
